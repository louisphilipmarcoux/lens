name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out -count=1
      - name: Coverage summary
        run: go tool cover -func=coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build all binaries
        run: make build

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        ports:
          - 8123:8123
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build services
        run: make build
      - name: Start ingest service
        run: |
          ./bin/lens-ingest &
          sleep 2
        env:
          LENS_CLICKHOUSE_DSN: "clickhouse://localhost:9000/default"
          LENS_INGEST_HTTP_ADDR: ":8080"
          LENS_INGEST_METRICS_ADDR: ":9091"
      - name: Start query service
        run: |
          ./bin/lens-query &
          sleep 2
        env:
          LENS_CLICKHOUSE_DSN: "clickhouse://localhost:9000/default"
          LENS_QUERY_HTTP_ADDR: ":8081"
          LENS_QUERY_METRICS_ADDR: ":9092"
      - name: Run integration tests
        run: go test ./tests/integration/... -tags=integration -count=1 -timeout=120s
        env:
          LENS_INGEST_URL: "http://localhost:8080"
          LENS_QUERY_URL: "http://localhost:8081"
