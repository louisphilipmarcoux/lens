# Lens agent configuration for portfolio integration test.
# Scrapes metrics from all three projects.

proc_root: /host/proc
collect_interval: 10s
otel_grpc_addr: ":4317"
http_addr: ":9090"

backend:
  url: http://lens-ingest:8080
  timeout: 30s

buffer:
  dir: /var/lib/lens/buffer
  max_segment_size: 67108864
  max_total_size: 1073741824

batch:
  max_size: 1000
  max_wait: 5s

log_files:
  - path: /var/log/raft-1.log
    service: raft-node-1
    format: json
  - path: /var/log/raft-2.log
    service: raft-node-2
    format: json
  - path: /var/log/raft-3.log
    service: raft-node-3
    format: json
  - path: /var/log/vessel.log
    service: vessel
    format: json
